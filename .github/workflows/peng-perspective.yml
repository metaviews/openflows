name: Peng Perspective

# Peng (鵬) synthesizes emerging patterns and writes a digest three times per week.
# The digest publishes directly to src/perspective/ on main. Circuit drafts land in
# drafts/ only — humans promote them in conversation with Claude.

on:
  schedule:
    - cron: '0 8 * * 1,3,5'   # Monday, Wednesday, Friday at 08:00 UTC
  workflow_dispatch:             # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  perspective:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the knowledge manifest — synthesize and digest both require it
      - name: Build knowledge manifest
        run: npm run build

      # Draft a new circuit connecting unaddressed patterns in the knowledge base
      - name: Run Peng synthesis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          FALLBACK_OPENROUTER_MODEL: ${{ vars.FALLBACK_OPENROUTER_MODEL }}
        run: node scripts/synthesize.js

      # Write Peng's View — the editorial briefing for the human reviewer
      - name: Run Peng digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          FALLBACK_OPENROUTER_MODEL: ${{ vars.FALLBACK_OPENROUTER_MODEL }}
        run: node scripts/digest.js

      - name: Check for new output
        id: check
        run: |
          git add -f drafts/ src/perspective/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new output this run."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Peng (Openflows Agent)"
          git config user.email "peng@openflows.org"
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "peng: perspective ${DATE}"
          git pull --rebase origin main
          git push origin main
