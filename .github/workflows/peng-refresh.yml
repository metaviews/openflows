name: Peng Refresh

# Peng (鵬) checks existing entries against their source URLs daily.
# Entries not reviewed in more than 7 days are assessed for meaningful updates.
# Update draft notes land in drafts/updates/ for human review.
# lastReviewed is bumped on every assessed entry regardless of outcome.

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 09:00 UTC (after intake at 06:00)
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build knowledge manifest
        run: npm run build

      - name: Run Peng refresh
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          FALLBACK_OPENROUTER_MODEL: ${{ vars.FALLBACK_OPENROUTER_MODEL }}
        run: node scripts/refresh.js --limit 15 --days 7

      - name: Check for changes
        id: check
        run: |
          git add src/currency/ drafts/updates/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes this run."
          else
            UPDATES=$(git diff --staged --name-only | grep '^drafts/updates/' | wc -l)
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "updates=${UPDATES}" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Peng (Openflows Agent)"
          git config user.email "peng@openflows.org"
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "peng: refresh ${DATE} — ${{ steps.check.outputs.updates }} update draft(s)"
          git pull --rebase origin main
          git push origin main
