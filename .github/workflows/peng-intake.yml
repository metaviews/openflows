name: Peng Intake

# Peng (鵬) runs intake on a schedule, screens signals against the knowledge base,
# and drafts new currency entries directly to main. Drafts land in drafts/ only —
# nothing enters src/ automatically. Humans promote entries in conversation with Claude.

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  intake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the knowledge manifest first — intake deduplicates against it
      - name: Build knowledge manifest
        run: npm run build

      - name: Run Peng intake
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          FALLBACK_OPENROUTER_MODEL: ${{ vars.FALLBACK_OPENROUTER_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: node scripts/intake.js --sources github,huggingface,brave,opensourceprojects --limit 10

      - name: Run quality audit
        run: node scripts/audit.js

      - name: Update proposal queue
        run: node scripts/queue.js

      - name: Check for new drafts
        id: check
        run: |
          git add audit/
          git add -f drafts/
          DRAFTS=$(git diff --staged --name-only | grep '^drafts/[^/][^/]*\.md$' | grep -v '^drafts/QUEUE\.md$' | grep -v '^drafts/digest-.*\.md$' || true)
          if [ -z "$DRAFTS" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new drafts this run."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            COUNT=$(printf '%s\n' "$DRAFTS" | sed '/^$/d' | wc -l)
            echo "count=${COUNT}" >> $GITHUB_OUTPUT
            echo "New drafts: ${COUNT}"
          fi

      - name: Commit and push drafts
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Peng (Openflows Agent)"
          git config user.email "peng@openflows.org"
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "peng: intake ${DATE} — ${{ steps.check.outputs.count }} new draft(s)"
          git push origin main
